name: Update Image Daily

on:
  schedule:
    - cron: '0 15 * * *'  # UTC 15:00 -> KST 00:00
  workflow_dispatch:  # 수동 실행 가능

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 가져오기
        uses: actions/checkout@v5

      - name: Python 환경 설정
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libffi-dev fonts-noto-cjk

      - name: Python 패키지 설치
        run: pip install pillow requests

      - name: Python 실행
        run: python d_day.py

      - name: 변경사항 GitHub에 업로드
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add ./output_images/safety.png
          git commit -m "자동 업데이트: $(date '+%Y-%m-%d')" || echo "No changes to commit"
          git push
